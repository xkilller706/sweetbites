<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetas - SweetBites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'verde-menta': '#6BD080',
                        'verde-agua': '#A4C3B2',
                        'beige-calido': '#DED6D1',
                        'rosa-claro': '#EEC6CA',
                        'rosa-vivo': '#FFB7C3',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-beige-calido">
    <!-- Navbar -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-3xl">🍰</span>
                <a href="index.html" class="text-2xl font-bold text-rosa-vivo">SweetBites</a>
            </div>
            <div class="hidden md:flex space-x-6">
                <a href="index.html" class="text-gray-700 hover:text-rosa-vivo transition">Inicio</a>
                <a href="recipes.html" class="text-rosa-vivo font-semibold">Recetas</a>
                <a href="favorites.html" id="favoritesLink" class="text-gray-700 hover:text-rosa-vivo transition hidden">Favoritos</a>
            </div>
            <div>
                <a href="login.html" id="loginBtn" class="bg-rosa-vivo text-white px-6 py-2 rounded-full hover:bg-opacity-90 transition">
                    Iniciar Sesión
                </a>
                <button id="logoutBtn" class="bg-gray-600 text-white px-6 py-2 rounded-full hover:bg-gray-700 transition hidden" onclick="logout()">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-12 animate-fade-in-down">
            <h1 class="text-5xl md:text-6xl font-bold text-gray-800 mb-4">
                📖 Catálogo de Recetas
            </h1>
            <p class="text-xl text-gray-600">Explora nuestra deliciosa colección de postres</p>
        </div>

        <!-- Búsqueda y Filtros -->
        <div class="bg-white p-6 rounded-2xl shadow-xl mb-12 animate-fade-in-up">
            <div class="grid md:grid-cols-4 gap-4">
                <!-- Búsqueda -->
                <div class="md:col-span-2">
                    <label class="block text-gray-700 mb-2">Buscar Receta</label>
                    <input type="text" id="searchInput" placeholder="Buscar por nombre..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-rosa-vivo">
                </div>

                <!-- Filtro Categoría -->
                <div>
                    <label class="block text-gray-700 mb-2">Categoría</label>
                    <select id="categoryFilter" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-rosa-vivo">
                        <option value="">Todas</option>
                        <option value="Tortas">Tortas</option>
                        <option value="Galletas">Galletas</option>
                        <option value="Chocolates">Chocolates</option>
                        <option value="Postres Fríos">Postres Fríos</option>
                        <option value="Tartas">Tartas</option>
                        <option value="Cupcakes">Cupcakes</option>
                    </select>
                </div>

                <!-- Filtro Dificultad -->
                <div>
                    <label class="block text-gray-700 mb-2">Dificultad</label>
                    <select id="difficultyFilter" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-rosa-vivo">
                        <option value="">Todas</option>
                        <option value="Fácil">Fácil</option>
                        <option value="Intermedio">Intermedio</option>
                        <option value="Difícil">Difícil</option>
                    </select>
                </div>
            </div>

            <div class="mt-6 flex gap-3">
                <button onclick="applyFilters()" class="flex-1 bg-gradient-to-r from-rosa-vivo to-rosa-claro text-white px-8 py-3 rounded-xl font-semibold hover:shadow-lg hover:scale-105 transition-all duration-300">
                    ✨ Aplicar Filtros
                </button>
                <button onclick="clearFilters()" class="bg-gray-200 text-gray-700 px-8 py-3 rounded-xl font-semibold hover:bg-gray-300 hover:scale-105 transition-all duration-300">
                    🔄 Limpiar
                </button>
            </div>
        </div>

        <!-- Grid de Recetas -->
        <div id="recipesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Las recetas se cargan dinámicamente -->
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-12 hidden">
            <p class="text-gray-600">Cargando recetas...</p>
        </div>

        <!-- No Results -->
        <div id="noResults" class="text-center py-12 hidden">
            <p class="text-gray-600 text-lg">No se encontraron recetas</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="mb-2">🍰 SweetBites Recetas - Proyecto SENA 2026</p>
        </div>
    </footer>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 right-4 bg-white px-6 py-4 rounded-lg shadow-lg hidden z-50"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/recipes.js"></script>
</body>
</html>
