# =====================================================
# CONFIGURACIÓN NGINX PARA VPS - SWEETBITES
# =====================================================
# Ubicación en VPS: /etc/nginx/sites-available/sweetbites.proyectoscampus.top
# =====================================================

# Bloque HTTP - Redirección automática a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sweetbites.proyectoscampus.top;

    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

# Bloque HTTPS - Configuración principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sweetbites.proyectoscampus.top;

    # ===== CERTIFICADOS SSL (Generados por Certbot) =====
    ssl_certificate /etc/letsencrypt/live/sweetbites.proyectoscampus.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sweetbites.proyectoscampus.top/privkey.pem;

    # ===== CONFIGURACIÓN SSL SEGURA =====
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ===== HEADERS DE SEGURIDAD =====
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===== PROXY HACIA CONTENEDOR DOCKER FRONTEND =====
    # IMPORTANTE: SweetBites usa puerto 80 (diferente de MotoExpert que usa 8000)
    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;

        # Headers para WebSocket y conexiones persistentes
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Headers estándar de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Configuración de timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Deshabilitar buffering para respuestas streaming
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # ===== ARCHIVOS DE LOG =====
    access_log /var/log/nginx/sweetbites_access.log;
    error_log /var/log/nginx/sweetbites_error.log;

    # ===== TAMAÑO MÁXIMO DE SUBIDA =====
    client_max_body_size 10M;
}

# =====================================================
# INSTRUCCIONES DE INSTALACIÓN EN VPS:
# =====================================================
# 1. Crear archivo:
#    nano /etc/nginx/sites-available/sweetbites.proyectoscampus.top
#
# 2. Copiar TODO el contenido de arriba (desde "server {" hasta el final)
#
# 3. Guardar: Ctrl+O, Enter, Ctrl+X
#
# 4. Crear enlace simbólico:
#    ln -s /etc/nginx/sites-available/sweetbites.proyectoscampus.top /etc/nginx/sites-enabled/
#
# 5. Verificar sintaxis:
#    nginx -t
#
# 6. Si todo está OK, recargar Nginx:
#    systemctl reload nginx
#
# 7. Generar certificado SSL:
#    certbot --nginx -d sweetbites.proyectoscampus.top
# =====================================================
